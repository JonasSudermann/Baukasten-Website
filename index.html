<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODULAR – Website-Baukasten & Konfigurator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&family=Lora:wght@400;600;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{-webkit-font-smoothing:antialiased}
input[type="color"]{-webkit-appearance:none;appearance:none;border:none}
input[type="color"]::-webkit-color-swatch-wrapper{padding:2px}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease forwards}
.fd1{animation-delay:.1s;opacity:0}.fd2{animation-delay:.2s;opacity:0}.fd3{animation-delay:.3s;opacity:0}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-track{display:flex;animation:marquee 20s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
[contenteditable]:focus{outline:2px dashed rgba(46,134,193,0.5);border-radius:4px;outline-offset:2px}
[contenteditable]{cursor:text;transition:outline 0.2s}
.editable-hint{position:relative}
.editable-hint::after{content:'✎';position:absolute;top:-2px;right:-14px;font-size:10px;opacity:0.3}
.btn-hover{transition:all 0.25s ease;cursor:default!important}
.btn-hover:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15);filter:brightness(1.1)}
.smooth-scroll{scroll-behavior:smooth}
.acc-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.35s ease;padding:0 14px}
.acc-body.open{max-height:300px;padding:10px 14px 14px}

/* ── Mobile Overlay ── */
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sidebar-overlay{animation:fadeIn .2s ease forwards}
.sidebar-panel{animation:slideUp .3s ease forwards}

/* ── Touch-friendly ── */
@media(hover:none){
  .btn-hover:hover{transform:none;box-shadow:none;filter:none}
  .btn-hover:active{transform:scale(0.97);filter:brightness(0.95)}
}
</style>
</head>
<body>
<div id="root"></div>

<!-- ══════════════════════════════════════════════════════════════

<script type="text/babel">
window.MODULAR = {
  _modules: [],
  register: function(mod) {
    if (!this._modules.find(m => m.id === mod.id)) {
      this._modules.push(mod);
    }
  },
  get: function(id) { return this._modules.find(m => m.id === id); },
  getAll: function() { return [...this._modules]; },
  getAllTexts: function() {
    const all = {};
    this._modules.forEach(m => { if (m.texts) Object.assign(all, m.texts); });
    return all;
  }
};

/* ── Globale Helfer ── */
window.li = function(hex, a) {
  a = a === undefined ? 0.85 : a;
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.round(r+(255-r)*a)+','+Math.round(g+(255-g)*a)+','+Math.round(b+(255-b)*a)+')';
};

/* ── useWindowWidth Hook ── */
window.useWindowWidth = function useWindowWidth() {
  var st = React.useState(window.innerWidth);
  var w = st[0], setW = st[1];
  React.useEffect(function() {
    var h = function() { setW(window.innerWidth); };
    window.addEventListener("resize", h);
    return function() { window.removeEventListener("resize", h); };
  }, []);
  return w;
};

  eye: React.createElement('svg',{width:16,height:16,viewBox:"0 0 18 18",fill:"none"},React.createElement('path',{d:"M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z",stroke:"currentColor",strokeWidth:1.3}),React.createElement('circle',{cx:9,cy:9,r:2.5,stroke:"currentColor",strokeWidth:1.3})),
  arrow: React.createElement('svg',{width:14,height:14,viewBox:"0 0 16 16",fill:"none"},React.createElement('path',{d:"M3 8h10M9 4l4 4-4 4",stroke:"currentColor",strokeWidth:1.5,strokeLinecap:"round",strokeLinejoin:"round"})),

};

/* ── Editierbares Text-Element ── */
window.ET = function ET({k, cfg, edit, tag, style, children}) {
  const Tag = tag || 'span';
  const allTexts = window.MODULAR.getAllTexts();
  const val = cfg.texts[k] ?? children ?? allTexts[k] ?? "";
  if (!edit) return <Tag style={style}>{val}</Tag>;
  return <Tag contentEditable suppressContentEditableWarning
    onBlur={e => cfg.setText(k, e.target.innerText)}
    style={{...style, cursor:"text"}} className="editable-hint">{val}</Tag>;
};

/* ── File-Upload Komponente ── */
window.FileUpload = function FileUpload({label, accept, onUp, preview, onRm}) {
  const ref = React.useRef();
  const hf = e => { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>onUp(ev.target.result,f.name); r.readAsDataURL(f); };
  return <div style={{marginBottom:12}}>
    <div style={{fontSize:11,fontWeight:600,marginBottom:5,opacity:.6,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div>
    {preview
      ? <div style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid rgba(0,0,0,.1)"}}>
          <img src={preview} alt="" style={{width:"100%",height:70,objectFit:"contain",background:"#f8f8f8",display:"block"}}/>
          <button onClick={onRm} style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{window.MI.trash}</button>
        </div>
      : <button onClick={()=>ref.current?.click()} style={{width:"100%",padding:"14px 10px",border:"2px dashed rgba(0,0,0,.13)",borderRadius:8,background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:"inherit",opacity:.5,transition:"all .2s",fontFamily:"inherit"}}
          onMouseEnter={e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.borderColor="rgba(0,0,0,.3)"}}
          onMouseLeave={e=>{e.currentTarget.style.opacity=".5";e.currentTarget.style.borderColor="rgba(0,0,0,.13)"}}>
          {window.MI.upload}<span style={{fontSize:11}}>Datei auswaehlen</span>
        </button>
    }
    <input ref={ref} type="file" accept={accept} onChange={hf} style={{display:"none"}}/>
  </div>;
};

/* ── Color-Input Komponente ── */
window.ColorInput = function ColorInput({label, value, onChange}) {
  return <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
    <input type="color" value={value} onChange={e=>onChange(e.target.value)} style={{width:30,height:30,border:"2px solid rgba(0,0,0,.1)",borderRadius:6,cursor:"pointer",padding:0}}/>
    <div><div style={{fontSize:11,fontWeight:600,opacity:.7}}>{label}</div><div style={{fontSize:10,fontFamily:"monospace",opacity:.4}}>{value}</div></div>
  </div>;
};

/* ── Branchen-Vorlagen ── */
window.PRESETS = [

<!-- MODUL-NAV -->
<script type="text/babel">
window.MODULAR.register({
  id: "nav",
  name: "Navigation",
  cat: "Header",
  icon: "☰",
  desc: "Hauptmenue mit Logo und Menuepunkten",
  vars: ["Standard", "Transparent", "Zentriert"],
  texts: {
    "nav-name": "Ihr Unternehmen",
    "nav-1": "Start", "nav-2": "Leistungen", "nav-3": "Ueber uns", "nav-4": "Kontakt"
  },
  render: function(cfg, edit) {
    const {colors, logo, companyName: cn, font, variants, previewMode} = cfg;
    const ff = font || "'DM Sans',sans-serif";
    const mob = previewMode === "mobile";
    const v = variants["nav"] || 0;
    const ET = window.ET;
    const styles = [
      {bg: colors.primary, color: "#fff"},
      {bg: "transparent", color: colors.primary, borderBottom: "1px solid " + colors.primary + "22"},
      {bg: colors.primary, color: "#fff", justifyContent: "center", flexDirection: "column", alignItems: "center", gap: 6},
    ];
    const s = styles[v] || styles[0];
    return <div style={{padding: mob ? "10px 16px" : "12px 32px", display: "flex", alignItems: "center", justifyContent: s.justifyContent || "space-between", flexDirection: s.flexDirection || "row", gap: s.gap, background: s.bg, color: s.color, fontFamily: ff, borderBottom: s.borderBottom || "none"}}>
      <div style={{display: "flex", alignItems: "center", gap: 10}}>
        {logo ? <img src={logo} alt="" style={{height: mob ? 22 : 28, width: "auto"}}/> : <div style={{width: 28, height: 28, borderRadius: 6, background: "rgba(128,128,128,.2)"}}/>}
        <ET k="nav-name" cfg={cfg} edit={edit} tag="span" style={{fontWeight: 700, fontSize: mob ? 13 : 15}}>{cn || "Ihr Unternehmen"}</ET>
      </div>
      {!mob && <div style={{display: "flex", gap: 20, fontSize: 12, opacity: .85}}>
        {["nav-1","nav-2","nav-3","nav-4"].map(k => <ET key={k} k={k} cfg={cfg} edit={edit} tag="span" style={{cursor: "default"}}/>)}
      </div>}
      {mob && <div style={{width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", opacity: .7}}>☰</div>}
    </div>;
  }
});
</script>

<!-- MODUL-TEXTCONTENT -->
<script type="text/babel">
window.MODULAR.register({
  id: "textcontent",
  name: "Text-Content",
  cat: "Inhalt",
  icon: "¶",
  desc: "Flexibler Textblock mit Ueberschrift, Fliesstext und optionaler Highlight-Box",
  vars: ["Zentriert", "Zweispaltig", "Mit Highlight-Box"],
  texts: {
    "tc-overtitle": "Wissenswertes",
    "tc-title": "Was uns auszeichnet",
    "tc-text1": "Wir verbinden jahrelange Erfahrung mit einem klaren Fokus auf Qualitaet. Jedes Projekt wird individuell betreut - von der ersten Idee bis zum fertigen Ergebnis. Dabei setzen wir auf transparente Kommunikation und enge Zusammenarbeit.",
    "tc-text2": "Unser Anspruch ist es, nicht nur Erwartungen zu erfuellen, sondern sie zu uebertreffen. Mit bewaehrten Methoden und einem Auge fuers Detail schaffen wir Loesungen, die nachhaltig ueberzeugen und echten Mehrwert bieten.",
    "tc-highlight": "Qualitaet bedeutet, es richtig zu machen - auch wenn niemand zuschaut.",
    "tc-highlight-author": "- Unser Leitsatz"
  },
  render: function(cfg, edit) {
    const {colors, font, variants, previewMode} = cfg;
    const ff = font || "'DM Sans',sans-serif";
    const mob = previewMode === "mobile";
    const v = variants["textcontent"] || 0;
    const ET = window.ET;
    const li = window.li;
    const isCenter = v === 0;
    const isTwoCols = v === 1;

    if (isCenter) {
      return <div style={{padding: (mob ? 32 : 56) + "px " + (mob ? 20 : 32) + "px", background: "#fff", fontFamily: ff}}>
        <div style={{maxWidth: 640, margin: "0 auto", textAlign: "center"}}>
          <ET k="tc-overtitle" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, fontWeight: 700, letterSpacing: ".15em", textTransform: "uppercase", color: colors.secondary, marginBottom: 6}}/>
          <ET k="tc-title" cfg={cfg} edit={edit} tag="h3" style={{fontSize: mob ? 18 : 22, fontWeight: 700, color: colors.primary, margin: "0 0 16px", lineHeight: 1.3, fontFamily: ff}}/>
          <div style={{width: 40, height: 3, borderRadius: 2, background: colors.accent, margin: "0 auto 18px"}}/>
          <ET k="tc-text1" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: "0 0 14px"}}/>
          <ET k="tc-text2" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
        </div>
      </div>;
    }
    if (isTwoCols) {
      return <div style={{padding: (mob ? 32 : 56) + "px " + (mob ? 20 : 32) + "px", background: "#fff", fontFamily: ff}}>
        <div style={{marginBottom: mob ? 16 : 24}}>
          <ET k="tc-overtitle" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, fontWeight: 700, letterSpacing: ".15em", textTransform: "uppercase", color: colors.secondary, marginBottom: 6}}/>
          <ET k="tc-title" cfg={cfg} edit={edit} tag="h3" style={{fontSize: mob ? 18 : 22, fontWeight: 700, color: colors.primary, margin: 0, lineHeight: 1.3, fontFamily: ff}}/>
        </div>
        <div style={{display: "flex", gap: mob ? 14 : 28, flexDirection: mob ? "column" : "row"}}>
          <div style={{flex: 1, borderLeft: "3px solid " + colors.accent, paddingLeft: mob ? 12 : 16}}>
            <ET k="tc-text1" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
          </div>
          <div style={{flex: 1}}>
            <ET k="tc-text2" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
          </div>
        </div>
      </div>;
    }
    return <div style={{padding: (mob ? 32 : 56) + "px " + (mob ? 20 : 32) + "px", background: "#fff", fontFamily: ff}}>
      <div style={{display: "flex", gap: mob ? 16 : 28, flexDirection: mob ? "column" : "row", alignItems: "flex-start"}}>
        <div style={{flex: 1}}>
          <ET k="tc-overtitle" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, fontWeight: 700, letterSpacing: ".15em", textTransform: "uppercase", color: colors.secondary, marginBottom: 6}}/>
          <ET k="tc-title" cfg={cfg} edit={edit} tag="h3" style={{fontSize: mob ? 18 : 22, fontWeight: 700, color: colors.primary, margin: "0 0 14px", lineHeight: 1.3, fontFamily: ff}}/>
          <ET k="tc-text1" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
        </div>
        <div style={{width: mob ? "100%" : 220, flexShrink: 0, borderRadius: 10, padding: mob ? 16 : 20, background: "linear-gradient(135deg," + colors.primary + "," + colors.secondary + ")", color: "#fff", position: "relative", overflow: "hidden"}}>
          <div style={{position: "absolute", top: -20, right: -20, width: 80, height: 80, borderRadius: "50%", background: "rgba(255,255,255,.08)"}}/>
          <div style={{fontSize: 28, opacity: .25, marginBottom: 8, lineHeight: 1}}>&#10077;</div>
          <ET k="tc-highlight" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.6, fontStyle: "italic", margin: "0 0 10px", position: "relative"}}/>
          <ET k="tc-highlight-author" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, opacity: .6, fontWeight: 600, position: "relative"}}/>
        </div>
      </div>
    </div>;
  }
});
</script>

<!-- MODUL-HERO -->
<script type="text/babel">
window.MODULAR.register({
  id: "hero",
  name: "Hero-Sektion",
  cat: "Einstieg",
  icon: "◆",
  desc: "Grossflaechiger Einstiegsbereich mit Ueberschrift und CTA",
  vars: ["Fullscreen", "Split", "Minimal"],
  texts: {
    "hero-overtitle": "Willkommen",
    "hero-title": "Professionelle Websites.\nModular gebaut.",
    "hero-sub": "Wir erstellen Ihre individuelle Website aus hochwertigen Bausteinen - schnell, flexibel und auf Ihre Branche zugeschnitten.",
    "hero-cta1": "Jetzt starten",
    "hero-cta2": "Mehr erfahren"
  },
  render: function(cfg, edit) {
    const {colors, heroImage, font, variants, previewMode, companyName: cn} = cfg;
    const ff = font || "'DM Sans',sans-serif";
    const mob = previewMode === "mobile";
    const v = variants["hero"] || 0;
    const ET = window.ET;
    const li = window.li;
    const isMin = v === 2, isSplit = v === 1;

     KONFIGURATOR - MOBILE RESPONSIVE
     ═══════════════════════════════════ */
  const TABS=[{id:"modules",ico:MI.layers,l:"Module"},{id:"design",ico:MI.palette,l:"Design"},{id:"media",ico:MI.image,l:"Medien"},{id:"fonts",ico:MI.typo,l:"Schrift"}];
  const showSidebarInline = !isMob && !isTablet;
  const sidebarW = isTablet ? 300 : 340;

  /* Sidebar-Inhalt als eigene Funktion */
  function renderSidebarContent() {
    return <>
      {/* ── TAB: Module ── */}
      {activeTab==="modules"&&<>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}}>Branchen-Vorlage</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {window.PRESETS.map(p=><button key={p.id} onClick={()=>{applyPreset(p);if(isMob)setSidebarOpen(false)}} style={{padding:"6px 12px",borderRadius:5,border:"1px solid rgba(0,0,0,.08)",background:"rgba(0,0,0,.02)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"inherit"}}>{p.name}</button>)}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}}>Aktive Module ({selMods.length})</div>
          {selMods.map((mid,idx)=>{
            const mod=window.MODULAR.get(mid);
            if(!mod) return null;
            return <div key={mid} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 9px",borderRadius:6,background:"rgba(46,134,193,.04)",marginBottom:3,border:"1px solid rgba(46,134,193,.1)"}}>
              <span style={{opacity:.25,display:"flex"}}>{MI.grip}</span>
              <span style={{fontSize:13,width:20,textAlign:"center"}}>{mod.icon}</span>
              <span style={{flex:1,fontWeight:600,fontSize:11}}>{mod.name}</span>
              <select value={variants[mid]||0} onChange={e=>setVar(mid,parseInt(e.target.value))} style={{fontSize:10,padding:"3px 4px",borderRadius:3,border:"1px solid rgba(0,0,0,.1)",background:"#fff",fontFamily:"inherit",cursor:"pointer",maxWidth:80}}>
                {mod.vars.map((vn,vi)=><option key={vi} value={vi}>{vn}</option>)}
              </select>
              <button onClick={()=>toggle(mid)} style={{background:"none",border:"none",cursor:"pointer",opacity:.25,color:"inherit",padding:2,display:"flex"}}>{MI.trash}</button>
            </div>;
          })}
        </div>
        {cats.map(cat=>{
          const mods=allModules.filter(m=>m.cat===cat);
          return <div key={cat} style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,opacity:.35,textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>{cat}</div>
            {mods.map(mod=><div key={mod.id} onClick={()=>toggle(mod.id)} style={{padding:"10px 12px",borderRadius:7,border:selMods.includes(mod.id)?"2px solid #2e86c1":"2px solid transparent",background:selMods.includes(mod.id)?"rgba(46,134,193,.06)":"rgba(0,0,0,.02)",cursor:"pointer",marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,borderRadius:5,background:selMods.includes(mod.id)?"#2e86c1":"rgba(0,0,0,.06)",color:selMods.includes(mod.id)?"#fff":"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0}}>{mod.icon}</div>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600}}>{mod.name}</div><div style={{fontSize:10,opacity:.45,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{mod.desc}</div></div>
              {selMods.includes(mod.id)&&<span style={{color:"#2e86c1",flexShrink:0}}>{MI.check}</span>}
            </div>)}
          </div>;
        })}
      </>}

      {/* ── TAB: Design ── */}
      {activeTab==="design"&&<>
        <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>Farbschema</div>
        <CI label="Primaerfarbe" value={colors.primary} onChange={v=>setColors(p=>({...p,primary:v}))}/>
        <CI label="Sekundaerfarbe" value={colors.secondary} onChange={v=>setColors(p=>({...p,secondary:v}))}/>
        <CI label="Akzentfarbe" value={colors.accent} onChange={v=>setColors(p=>({...p,accent:v}))}/>
        <div style={{display:"flex",gap:6,margin:"12px 0"}}>{Object.entries(colors).map(([k,v])=><div key={k} style={{flex:1,textAlign:"center"}}><div style={{height:32,borderRadius:6,background:v}}/><div style={{fontSize:9,opacity:.4,marginTop:2}}>{k}</div></div>)}</div>
        <div style={{height:1,background:"rgba(0,0,0,.06)",margin:"14px 0"}}/>
        <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:8}}>Unternehmensdaten</div>
        {[["Firmenname",companyName,setCN],["Strasse & Hausnr.",address,setAddr],["PLZ",zip,setZip],["Stadt",city,setCity],["Telefon",phone,setPhone],["E-Mail",email,setEmail]].map(([l,v,fn],i)=>
          <div key={i} style={{marginBottom:6}}>
            <div style={{fontSize:10,fontWeight:600,opacity:.5,marginBottom:2}}>{l}</div>
            <input type="text" value={v} onChange={e=>fn(e.target.value)} placeholder={l} style={{width:"100%",padding:"8px 10px",borderRadius:5,border:"1px solid rgba(0,0,0,.1)",fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
          </div>
        )}
      </>}

      {/* ── TAB: Medien ── */}
      {activeTab==="media"&&<>
        <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>Logo & Bilder</div>
        <FU label="Firmenlogo" accept="image/*" onUp={(d)=>setLogo(d)} preview={logo} onRm={()=>setLogo(null)}/>
        <FU label="Hero-Bild" accept="image/*" onUp={d=>setHeroImage(d)} preview={heroImage} onRm={()=>setHeroImage(null)}/>
        <div style={{height:1,background:"rgba(0,0,0,.06)",margin:"14px 0"}}/>
        <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Galerie ({galleryImages.length}/6)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:8}}>
          {galleryImages.map((img,i)=><div key={i} style={{position:"relative",borderRadius:5,overflow:"hidden",aspectRatio:"1"}}>
            <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            <button onClick={()=>setGalleryImages(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:3,width:20,height:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>{MI.x}</button>
          </div>)}
        </div>
        {galleryImages.length<6&&<FU label="Galerie-Bild" accept="image/*" onUp={d=>setGalleryImages(p=>[...p,d])} preview={null} onRm={()=>{}}/>}
        <div style={{height:1,background:"rgba(0,0,0,.06)",margin:"14px 0"}}/>
        <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Partner-Logos ({partnerLogos.length}/8)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:8}}>
          {partnerLogos.map((img,i)=><div key={i} style={{position:"relative",borderRadius:5,overflow:"hidden",aspectRatio:"2/1",background:"#f8f8f8",border:"1px solid rgba(0,0,0,.06)"}}>
            <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"contain",padding:2}}/>
            <button onClick={()=>setPartnerLogos(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:1,right:1,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:3,width:14,height:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>{MI.x}</button>
          </div>)}
        </div>
        {partnerLogos.length<8&&<FU label="Partner-Logo" accept="image/*" onUp={d=>setPartnerLogos(p=>[...p,d])} preview={null} onRm={()=>{}}/>}
      </>}

      {/* ── TAB: Schrift ── */}
      {activeTab==="fonts"&&<>
        <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>Schriftart</div>
        {window.FONTS.map(f=><div key={f.name} onClick={()=>setFont(f.val)} style={{padding:"12px 14px",borderRadius:7,border:font===f.val?"2px solid #2e86c1":"2px solid transparent",background:font===f.val?"rgba(46,134,193,.06)":"rgba(0,0,0,.02)",cursor:"pointer",marginBottom:5}}>
          <div style={{fontSize:15,fontFamily:f.val,fontWeight:700,marginBottom:1}}>{f.name}</div>
          <div style={{fontSize:11,fontFamily:f.val,opacity:.5}}>Professionelle Websites modular gebaut</div>
        </div>)}
      </>}
    </>;
  }

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'DM Sans',sans-serif",color:"#1a1a1a",overflow:"hidden",flexDirection:"column"}}>

      {/* KONFIGURATOR TOOLBAR */}
      <div style={{padding: isMob ? "8px 12px" : "7px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(0,0,0,.06)",background:"#fff",gap:8,flexShrink:0,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>setView("landing")}>
            <div style={{width:24,height:24,borderRadius:5,background:"#1a3c5e",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:8,height:8,borderRadius:2,border:"2px solid #fff"}}/></div>
            {!isMob && <span style={{fontWeight:700,fontSize:12}}>MODULAR</span>}
          </div>
          {!isMob && <div style={{fontSize:10,color:"#2e86c1",fontWeight:600,marginLeft:4}}>Konfigurator</div>}
        </div>

        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {/* Preview Mode Buttons */}
          {!isMob && [["desktop","Desktop"],["tablet","Tablet"],["mobile","Mobile"]].map(([id,l])=>
            <button key={id} onClick={()=>setPM(id)} style={{padding:"4px 10px",borderRadius:5,border:"none",background:previewMode===id?"#1a3c5e":"rgba(0,0,0,.04)",color:previewMode===id?"#fff":"rgba(0,0,0,.45)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
          )}
          {isMob && <select value={previewMode} onChange={e=>setPM(e.target.value)} style={{padding:"4px 8px",borderRadius:5,border:"1px solid rgba(0,0,0,.1)",fontSize:10,fontWeight:600,fontFamily:"inherit",background:"#fff"}}>
            <option value="desktop">Desktop</option>
            <option value="tablet">Tablet</option>
            <option value="mobile">Mobile</option>
          </select>}

          {/* Edit Mode Toggle */}
          <button onClick={()=>setEditMode(!editMode)} style={{padding: isMob ? "6px 10px" : "4px 12px",borderRadius:5,border:editMode?"2px solid #e67e22":"2px solid rgba(0,0,0,.08)",background:editMode?"rgba(230,126,34,.08)":"transparent",color:editMode?"#e67e22":"rgba(0,0,0,.5)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
            {MI.edit} {isMob ? "" : (editMode?"Bearbeitung aktiv":"Texte bearbeiten")}
          </button>

          {/* Mobile: Sidebar Toggle */}
          {(isMob || isTablet) && <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{padding:"6px 10px",borderRadius:5,border:sidebarOpen?"2px solid #2e86c1":"2px solid rgba(0,0,0,.08)",background:sidebarOpen?"rgba(46,134,193,.08)":"transparent",color:sidebarOpen?"#2e86c1":"rgba(0,0,0,.5)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
            {MI.settings} {isMob ? "" : "Einstellungen"}
          </button>}
        </div>
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden",position:"relative"}}>
        {/* ── DESKTOP SIDEBAR ── */}
        {showSidebarInline && <div style={{width:sidebarW,borderRight:"1px solid rgba(0,0,0,.06)",display:"flex",flexDirection:"column",background:"#fff",flexShrink:0}}>
          <div style={{display:"flex",borderBottom:"1px solid rgba(0,0,0,.06)"}}>
            {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 4px",background:"transparent",border:"none",borderBottom:activeTab===t.id?"2px solid #2e86c1":"2px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:activeTab===t.id?"#2e86c1":"rgba(0,0,0,.3)",fontFamily:"inherit"}}>
              {t.ico}<span style={{fontSize:9,fontWeight:600}}>{t.l}</span>
            </button>)}
          </div>
          <div style={{flex:1,overflow:"auto",padding:14}}>
            {renderSidebarContent()}
          </div>
        </div>}

        {/* ── MOBILE/TABLET SIDEBAR OVERLAY ── */}
        {(isMob || isTablet) && sidebarOpen && <>
          <div className="sidebar-overlay" onClick={()=>setSidebarOpen(false)} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.3)",zIndex:50}}/>
          <div className="sidebar-panel" style={{position:"absolute",bottom:0,left:0,right:0,zIndex:51,background:"#fff",borderRadius:"16px 16px 0 0",maxHeight: isMob ? "80vh" : "70vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 32px rgba(0,0,0,.12)"}}>
            {/* Drag handle */}
            <div style={{padding:"10px 0 4px",display:"flex",justifyContent:"center"}}>
              <div style={{width:36,height:4,borderRadius:2,background:"rgba(0,0,0,.15)"}}/>
            </div>
            {/* Tab buttons */}
            <div style={{display:"flex",borderBottom:"1px solid rgba(0,0,0,.06)",paddingLeft:4,paddingRight:4}}>
              {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px",background:"transparent",border:"none",borderBottom:activeTab===t.id?"2px solid #2e86c1":"2px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:activeTab===t.id?"#2e86c1":"rgba(0,0,0,.3)",fontFamily:"inherit"}}>
                {t.ico}<span style={{fontSize:10,fontWeight:600}}>{t.l}</span>
              </button>)}
            </div>
            {/* Content */}
            <div style={{flex:1,overflow:"auto",padding:16,WebkitOverflowScrolling:"touch"}}>
              {renderSidebarContent()}
            </div>
          </div>
        </>}

        {/* ── PREVIEW AREA ── */}
        <div style={{flex:1,overflow:"auto",display:"flex",justifyContent:"center",padding: isMob ? 8 : 16,WebkitOverflowScrolling:"touch"}}>
          <div style={{width:previewMode==="desktop"?"100%":previewMode==="tablet"?768:375,maxWidth:"100%",background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.08)",transition:"width .4s ease",alignSelf:"flex-start"}}>
            {selMods.length===0
              ? <div style={{padding: isMob ? 40 : 60,textAlign:"center",opacity:.3}}>
                  <div style={{fontSize:40,marginBottom:12}}>◇</div>
                  <div style={{fontSize:14,fontWeight:600}}>Keine Module ausgewaehlt</div>
                  <div style={{fontSize:12,marginTop:4}}>Module ueber {isMob || isTablet ? "den Einstellungen-Button" : "das linke Panel"} hinzufuegen</div>
                </div>
              : selMods.map(mid => {
                  const mod = window.MODULAR.get(mid);
                  if (!mod || !mod.render) return <div key={mid} style={{padding:20,textAlign:"center",opacity:.3,fontSize:12}}>Modul "{mid}" nicht gefunden</div>;
                  return <div key={mid}>{mod.render(cfg, editMode)}</div>;
                })
            }
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
