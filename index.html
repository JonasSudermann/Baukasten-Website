<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODULAR – Website-Baukasten & Konfigurator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&family=Lora:wght@400;600;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{-webkit-font-smoothing:antialiased}
input[type="color"]{-webkit-appearance:none;appearance:none;border:none}
input[type="color"]::-webkit-color-swatch-wrapper{padding:2px}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease forwards}
.fd1{animation-delay:.1s;opacity:0}.fd2{animation-delay:.2s;opacity:0}.fd3{animation-delay:.3s;opacity:0}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-track{display:flex;animation:marquee 20s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
[contenteditable]:focus{outline:2px dashed rgba(46,134,193,0.5);border-radius:4px;outline-offset:2px}
[contenteditable]{cursor:text;transition:outline 0.2s}
.editable-hint{position:relative}
.editable-hint::after{content:'✎';position:absolute;top:-2px;right:-14px;font-size:10px;opacity:0.3}
.btn-hover{transition:all 0.25s ease;cursor:default!important}
.btn-hover:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15);filter:brightness(1.1)}
.smooth-scroll{scroll-behavior:smooth}
.acc-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.35s ease;padding:0 14px}
.acc-body.open{max-height:300px;padding:10px 14px 14px}
</style>
</head>
<body>
<div id="root"></div>

<!-- ══════════════════════════════════════════════════════════════
     KERN: Modul-Registry, Helfer & gemeinsame Komponenten
     Dieser Block muss IMMER als erstes geladen werden.
     ══════════════════════════════════════════════════════════════ -->
<script type="text/babel">
/*
 * MODULAR - Modul-Registry-System
 * 
 * Jedes Modul registriert sich über window.MODULAR.register({...})
 * Die Haupt-App (ganz unten) liest dann alle registrierten Module.
 *
 * Modul-Struktur:
 * {
 *   id:    "hero",                          // Eindeutige ID
 *   name:  "Hero-Sektion",                  // Anzeigename
 *   cat:   "Einstieg",                      // Kategorie
 *   icon:  "◆",                             // Icon-Emoji
 *   desc:  "Beschreibung...",               // Kurzbeschreibung
 *   vars:  ["Fullscreen","Split","Minimal"],// Darstellungs-Varianten
 *   texts: { "hero-title": "Standard..." }, // Standard-Texte
 *   render: function(cfg, edit) { ... }     // React-Render-Funktion
 * }
 */

window.MODULAR = {
  _modules: [],
  register: function(mod) {
    // Duplikate verhindern
    if (!this._modules.find(m => m.id === mod.id)) {
      this._modules.push(mod);
    }
  },
  get: function(id) { return this._modules.find(m => m.id === id); },
  getAll: function() { return [...this._modules]; },
  getAllTexts: function() {
    const all = {};
    this._modules.forEach(m => { if (m.texts) Object.assign(all, m.texts); });
    return all;
  }
};

/* ── Globale Helfer ── */
window.li = function(hex, a) {
  a = a === undefined ? 0.85 : a;
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.round(r+(255-r)*a)+','+Math.round(g+(255-g)*a)+','+Math.round(b+(255-b)*a)+')';
};

/* ── Icons ── */
window.MI = {

  trash: React.createElement('svg',{width:14,height:14,viewBox:"0 0 16 16",fill:"none"},React.createElement('path',{d:"M2 4h12M5.33 4V2.67A1.33 1.33 0 016.67 1.33h2.66a1.33 1.33 0 011.34 1.34V4m2 0v9.33a1.33 1.33 0 01-1.34 1.34H4.67a1.33 1.33 0 01-1.34-1.34V4h9.34z",stroke:"currentColor",strokeWidth:1.2,strokeLinecap:"round"})),
  grip: React.createElement('svg',{width:14,height:14,viewBox:"0 0 14 14",fill:"none"},React.createElement('circle',{cx:5,cy:3,r:1.2,fill:"currentColor"}),React.createElement('circle',{cx:9,cy:3,r:1.2,fill:"currentColor"}),React.createElement('circle',{cx:5,cy:7,r:1.2,fill:"currentColor"}),React.createElement('circle',{cx:9,cy:7,r:1.2,fill:"currentColor"}),React.createElement('circle',{cx:5,cy:11,r:1.2,fill:"currentColor"}),React.createElement('circle',{cx:9,cy:11,r:1.2,fill:"currentColor"})),
  eye: React.createElement('svg',{width:16,height:16,viewBox:"0 0 18 18",fill:"none"},React.createElement('path',{d:"M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z",stroke:"currentColor",strokeWidth:1.3}),React.createElement('circle',{cx:9,cy:9,r:2.5,stroke:"currentColor",strokeWidth:1.3})),
  arrow: React.createElement('svg',{width:14,height:14,viewBox:"0 0 16 16",fill:"none"},React.createElement('path',{d:"M3 8h10M9 4l4 4-4 4",stroke:"currentColor",strokeWidth:1.5,strokeLinecap:"round",strokeLinejoin:"round"})),
  chev: React.createElement('svg',{width:12,height:12,viewBox:"0 0 14 14",fill:"none"},React.createElement('path',{d:"M5 3l4 4-4 4",stroke:"currentColor",strokeWidth:1.5,strokeLinecap:"round"})),
  edit: React.createElement('svg',{width:14,height:14,viewBox:"0 0 16 16",fill:"none"},React.createElement('path',{d:"M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z",stroke:"currentColor",strokeWidth:1.3,strokeLinejoin:"round"})),

  palette: React.createElement('svg',{width:18,height:18,viewBox:"0 0 20 20",fill:"none"},React.createElement('circle',{cx:10,cy:10,r:8,stroke:"currentColor",strokeWidth:1.5}),React.createElement('circle',{cx:7,cy:8,r:1.5,fill:"currentColor"}),React.createElement('circle',{cx:10,cy:6,r:1.5,fill:"currentColor"}),React.createElement('circle',{cx:13,cy:8,r:1.5,fill:"currentColor"})),
  layers: React.createElement('svg',{width:18,height:18,viewBox:"0 0 20 20",fill:"none"},React.createElement('path',{d:"M10 2l8 4-8 4-8-4 8-4zM2 10l8 4 8-4M2 14l8 4 8-4",stroke:"currentColor",strokeWidth:1.5,strokeLinejoin:"round"})),
  image: React.createElement('svg',{width:18,height:18,viewBox:"0 0 20 20",fill:"none"},React.createElement('rect',{x:2,y:2,width:16,height:16,rx:2,stroke:"currentColor",strokeWidth:1.5}),React.createElement('circle',{cx:7,cy:7,r:2,stroke:"currentColor",strokeWidth:1.2}),React.createElement('path',{d:"M2 14l4-4 3 3 3-3 6 6",stroke:"currentColor",strokeWidth:1.3,strokeLinejoin:"round"})),
  typo: React.createElement('svg',{width:18,height:18,viewBox:"0 0 20 20",fill:"none"},React.createElement('path',{d:"M4 5h12M7 5v10M13 5v10M5 15h4M11 15h4",stroke:"currentColor",strokeWidth:1.5,strokeLinecap:"round"})),
};

/* ── Editierbares Text-Element ── */
window.ET = function ET({k, cfg, edit, tag, style, children}) {
  const Tag = tag || 'span';
  const allTexts = window.MODULAR.getAllTexts();
  const val = cfg.texts[k] ?? children ?? allTexts[k] ?? "";
  if (!edit) return <Tag style={style}>{val}</Tag>;
  return <Tag contentEditable suppressContentEditableWarning
    onBlur={e => cfg.setText(k, e.target.innerText)}
    style={{...style, cursor:"text"}} className="editable-hint">{val}</Tag>;
};

/* ── File-Upload Komponente ── */
window.FileUpload = function FileUpload({label, accept, onUp, preview, onRm}) {
  const ref = React.useRef();
  const hf = e => { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>onUp(ev.target.result,f.name); r.readAsDataURL(f); };
  return <div style={{marginBottom:12}}>
    <div style={{fontSize:11,fontWeight:600,marginBottom:5,opacity:.6,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div>
    {preview
      ? <div style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid rgba(0,0,0,.1)"}}>
          <img src={preview} alt="" style={{width:"100%",height:70,objectFit:"contain",background:"#f8f8f8",display:"block"}}/>
          <button onClick={onRm} style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:4,width:22,height:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{window.MI.trash}</button>
        </div>
      : <button onClick={()=>ref.current?.click()} style={{width:"100%",padding:"14px 10px",border:"2px dashed rgba(0,0,0,.13)",borderRadius:8,background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:"inherit",opacity:.5,transition:"all .2s",fontFamily:"inherit"}}
          onMouseEnter={e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.borderColor="rgba(0,0,0,.3)"}}
          onMouseLeave={e=>{e.currentTarget.style.opacity=".5";e.currentTarget.style.borderColor="rgba(0,0,0,.13)"}}>
          {window.MI.upload}<span style={{fontSize:11}}>Datei auswählen</span>
        </button>
    }
    <input ref={ref} type="file" accept={accept} onChange={hf} style={{display:"none"}}/>
  </div>;
};

/* ── Color-Input Komponente ── */
window.ColorInput = function ColorInput({label, value, onChange}) {
  return <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
    <input type="color" value={value} onChange={e=>onChange(e.target.value)} style={{width:30,height:30,border:"2px solid rgba(0,0,0,.1)",borderRadius:6,cursor:"pointer",padding:0}}/>
    <div><div style={{fontSize:11,fontWeight:600,opacity:.7}}>{label}</div><div style={{fontSize:10,fontFamily:"monospace",opacity:.4}}>{value}</div></div>
  </div>;
};

/* ── Branchen-Vorlagen ── */
window.PRESETS = [
  {id:"general",name:"Allgemein",mods:["nav","hero","features","textimage","testimonials","contact","footer"],colors:{primary:"#1a3c5e",secondary:"#2e86c1",accent:"#e67e22"}},
  {id:"arzt",name:"Arztpraxis",mods:["nav","hero","features","team","faq","contact","footer"],colors:{primary:"#1b7a4a",secondary:"#a8d5ba",accent:"#2e86c1"}},
  {id:"restaurant",name:"Restaurant",mods:["nav","hero","gallery","textimage","testimonials","contact","footer"],colors:{primary:"#8b1a1a",secondary:"#f5e6cc",accent:"#d4a017"}},
  {id:"handwerk",name:"Handwerk",mods:["nav","hero","features","gallery","testimonials","stats","contact","footer"],colors:{primary:"#2c3e50",secondary:"#e67e22",accent:"#27ae60"}},
  {id:"beratung",name:"Beratung",mods:["nav","hero","textimage","features","testimonials","pricing","cta","footer"],colors:{primary:"#4a1a6b",secondary:"#d4a5e5",accent:"#e67e22"}},
  {id:"immobilien",name:"Immobilien",mods:["nav","hero","features","gallery","stats","testimonials","contact","footer"],colors:{primary:"#1a3c5e",secondary:"#c9a96e",accent:"#2e86c1"}},
];

/* ── Schriftarten ── */
window.FONTS = [
  {name:"DM Sans",val:"'DM Sans',sans-serif"},
  {name:"Playfair Display",val:"'Playfair Display',serif"},
  {name:"Space Grotesk",val:"'Space Grotesk',sans-serif"},
  {name:"Lora",val:"'Lora',serif"},
  {name:"Outfit",val:"'Outfit',sans-serif"},
];
</script>

<!-- MODUL-NAV -->
<script type="text/babel">
window.MODULAR.register({
  id: "nav",
  name: "Navigation",
  cat: "Header",
  icon: "☰",
  desc: "Hauptmenü mit Logo und Menüpunkten",
  vars: ["Standard", "Transparent", "Zentriert"],
  texts: {
    "nav-name": "Ihr Unternehmen",
    "nav-1": "Start", "nav-2": "Leistungen", "nav-3": "Über uns", "nav-4": "Kontakt"
  },
  render: function(cfg, edit) {
    const {colors, logo, companyName: cn, font, variants, previewMode} = cfg;
    const ff = font || "'DM Sans',sans-serif";
    const mob = previewMode === "mobile";
    const v = variants["nav"] || 0;
    const ET = window.ET;

    const styles = [
      {bg: colors.primary, color: "#fff"},
      {bg: "transparent", color: colors.primary, borderBottom: "1px solid " + colors.primary + "22"},
      {bg: colors.primary, color: "#fff", justifyContent: "center", flexDirection: "column", alignItems: "center", gap: 6},
    ];
    const s = styles[v] || styles[0];

    return <div style={{padding: mob ? "10px 16px" : "12px 32px", display: "flex", alignItems: "center", justifyContent: s.justifyContent || "space-between", flexDirection: s.flexDirection || "row", gap: s.gap, background: s.bg, color: s.color, fontFamily: ff, borderBottom: s.borderBottom || "none"}}>
      <div style={{display: "flex", alignItems: "center", gap: 10}}>
        {logo ? <img src={logo} alt="" style={{height: mob ? 22 : 28, width: "auto"}}/> : <div style={{width: 28, height: 28, borderRadius: 6, background: "rgba(128,128,128,.2)"}}/>}
        <ET k="nav-name" cfg={cfg} edit={edit} tag="span" style={{fontWeight: 700, fontSize: mob ? 13 : 15}}>{cn || "Ihr Unternehmen"}</ET>
      </div>
      {!mob && <div style={{display: "flex", gap: 20, fontSize: 12, opacity: .85}}>
        {["nav-1","nav-2","nav-3","nav-4"].map(k => <ET key={k} k={k} cfg={cfg} edit={edit} tag="span" style={{cursor: "default"}}/>)}
      </div>}
    </div>;
  }
});
</script>

<!-- MODUL-TEXTCONTENT -->
<script type="text/babel">
window.MODULAR.register({
  id: "textcontent",
  name: "Text-Content",
  cat: "Inhalt",
  icon: "¶",
  desc: "Flexibler Textblock mit Überschrift, Fließtext und optionaler Highlight-Box",
  vars: ["Zentriert", "Zweispaltig", "Mit Highlight-Box"],
  texts: {
    "tc-overtitle": "Wissenswertes",
    "tc-title": "Was uns auszeichnet",
    "tc-text1": "Wir verbinden jahrelange Erfahrung mit einem klaren Fokus auf Qualität. Jedes Projekt wird individuell betreut – von der ersten Idee bis zum fertigen Ergebnis. Dabei setzen wir auf transparente Kommunikation und enge Zusammenarbeit.",
    "tc-text2": "Unser Anspruch ist es, nicht nur Erwartungen zu erfüllen, sondern sie zu übertreffen. Mit bewährten Methoden und einem Auge fürs Detail schaffen wir Lösungen, die nachhaltig überzeugen und echten Mehrwert bieten.",
    "tc-highlight": "Qualität bedeutet, es richtig zu machen – auch wenn niemand zuschaut.",
    "tc-highlight-author": "– Unser Leitsatz"
  },
  render: function(cfg, edit) {
    const {colors, font, variants, previewMode} = cfg;
    const ff = font || "'DM Sans',sans-serif";
    const mob = previewMode === "mobile";
    const v = variants["textcontent"] || 0;
    const ET = window.ET;
    const li = window.li;
    const isCenter = v === 0;
    const isTwoCols = v === 1;

    if (isCenter) {
      return <div style={{padding: (mob ? 32 : 56) + "px " + (mob ? 20 : 32) + "px", background: "#fff", fontFamily: ff}}>
        <div style={{maxWidth: 640, margin: "0 auto", textAlign: "center"}}>
          <ET k="tc-overtitle" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, fontWeight: 700, letterSpacing: ".15em", textTransform: "uppercase", color: colors.secondary, marginBottom: 6}}/>
          <ET k="tc-title" cfg={cfg} edit={edit} tag="h3" style={{fontSize: mob ? 18 : 22, fontWeight: 700, color: colors.primary, margin: "0 0 16px", lineHeight: 1.3, fontFamily: ff}}/>
          <div style={{width: 40, height: 3, borderRadius: 2, background: colors.accent, margin: "0 auto 18px"}}/>
          <ET k="tc-text1" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: "0 0 14px"}}/>
          <ET k="tc-text2" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
        </div>
      </div>;
    }

    if (isTwoCols) {
      return <div style={{padding: (mob ? 32 : 56) + "px " + (mob ? 20 : 32) + "px", background: "#fff", fontFamily: ff}}>
        <div style={{marginBottom: mob ? 16 : 24}}>
          <ET k="tc-overtitle" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, fontWeight: 700, letterSpacing: ".15em", textTransform: "uppercase", color: colors.secondary, marginBottom: 6}}/>
          <ET k="tc-title" cfg={cfg} edit={edit} tag="h3" style={{fontSize: mob ? 18 : 22, fontWeight: 700, color: colors.primary, margin: 0, lineHeight: 1.3, fontFamily: ff}}/>
        </div>
        <div style={{display: "flex", gap: mob ? 14 : 28, flexDirection: mob ? "column" : "row"}}>
          <div style={{flex: 1, borderLeft: "3px solid " + colors.accent, paddingLeft: mob ? 12 : 16}}>
            <ET k="tc-text1" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
          </div>
          <div style={{flex: 1}}>
            <ET k="tc-text2" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
          </div>
        </div>
      </div>;
    }

    return <div style={{padding: (mob ? 32 : 56) + "px " + (mob ? 20 : 32) + "px", background: "#fff", fontFamily: ff}}>
      <div style={{display: "flex", gap: mob ? 16 : 28, flexDirection: mob ? "column" : "row", alignItems: "flex-start"}}>
        <div style={{flex: 1}}>
          <ET k="tc-overtitle" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, fontWeight: 700, letterSpacing: ".15em", textTransform: "uppercase", color: colors.secondary, marginBottom: 6}}/>
          <ET k="tc-title" cfg={cfg} edit={edit} tag="h3" style={{fontSize: mob ? 18 : 22, fontWeight: 700, color: colors.primary, margin: "0 0 14px", lineHeight: 1.3, fontFamily: ff}}/>
          <ET k="tc-text1" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.7, opacity: .65, margin: 0}}/>
        </div>
        <div style={{width: mob ? "100%" : 220, flexShrink: 0, borderRadius: 10, padding: mob ? 16 : 20, background: "linear-gradient(135deg," + colors.primary + "," + colors.secondary + ")", color: "#fff", position: "relative", overflow: "hidden"}}>
          <div style={{position: "absolute", top: -20, right: -20, width: 80, height: 80, borderRadius: "50%", background: "rgba(255,255,255,.08)"}}/>
          <div style={{fontSize: 28, opacity: .25, marginBottom: 8, lineHeight: 1}}>&#10077;</div>
          <ET k="tc-highlight" cfg={cfg} edit={edit} tag="p" style={{fontSize: mob ? 12 : 13, lineHeight: 1.6, fontStyle: "italic", margin: "0 0 10px", position: "relative"}}/>
          <ET k="tc-highlight-author" cfg={cfg} edit={edit} tag="div" style={{fontSize: 10, opacity: .6, fontWeight: 600, position: "relative"}}/>
        </div>
      </div>
    </div>;
  }
});
</script>

<!-- MODUL-HERO -->
<script type="text/babel">
window.MODULAR.register({
  id: "hero",
  name: "Hero-Sektion",
  cat: "Einstieg",
  icon: "◆",
  desc: "Großflächiger Einstiegsbereich mit Überschrift und CTA",
  vars: ["Fullscreen", "Split", "Minimal"],
  texts: {
    "hero-overtitle": "Willkommen",
    "hero-title": "Professionelle Websites.\nModular gebaut.",
    "hero-sub": "Wir erstellen Ihre individuelle Website aus hochwertigen Bausteinen – schnell, flexibel und auf Ihre Branche zugeschnitten.",
    "hero-cta1": "Jetzt starten",
    "hero-cta2": "Mehr erfahren"
  },
  render: function(cfg, edit) {
    const {colors, heroImage, font, variants, previewMode, companyName: cn} = cfg;
    const ff = font || "'DM Sans',sans-serif";
    const mob = previewMode === "mobile";
    const v = variants["hero"] || 0;
    const ET = window.ET;
    const li = window.li;
    const isMin = v === 2, isSplit = v === 1;
    const sec = {padding: "0", background: isMin ? "#fff" : colors.primary, minHeight: mob ? 180 : 220, display: "flex", alignItems: isSplit ? "center" : "center", flexDirection: isSplit && !mob ? "row" : "column", color: isMin ? colors.primary : "#fff", overflow: "hidden", fontFamily: ff, position: "relative"};

    return <div style={sec}>
      {heroImage && !isMin && <div style={{position: "absolute", inset: 0, backgroundImage: "url(" + heroImage + ")", backgroundSize: "cover", backgroundPosition: "center", opacity: .25}}/>}
      <div style={{position: "relative", zIndex: 1, padding: mob ? "32px 20px" : "48px 32px", maxWidth: isSplit ? 420 : 480, flex: isSplit ? 1 : undefined}}>
        <ET k="hero-overtitle" cfg={cfg} edit={edit} tag="div" style={{fontSize: mob ? 9 : 10, fontWeight: 700, letterSpacing: ".15em", textTransform: "uppercase", opacity: .7, marginBottom: 10}}/>
        <ET k="hero-title" cfg={cfg} edit={edit} tag="h2" style={{fontSize: mob ? 20 : 26, fontWeight: 700, lineHeight: 1.2, margin: "0 0 12px", fontFamily: ff, whiteSpace: "pre-line"}}/>

                <div style={{textAlign:"center",marginBottom:20}}>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{pk.n}</div>
                  <div style={{fontSize:36,fontWeight:800,color:"#1a3c5e",letterSpacing:"-.02em"}}>{pk.p}</div>
                  <div style={{fontSize:12,opacity:.5}}>{pk.sub}</div>
                </div>
                {pk.feats.map((f,j)=><div key={j} style={{display:"flex",alignItems:"center",gap:8,fontSize:13,opacity:.7,marginBottom:8}}><span style={{color:"#27ae60",fontWeight:700}}>✓</span>{f}</div>)}
                <button className="btn-hover" style={{width:"100%",marginTop:16,padding:"10px 20px",borderRadius:8,border:"none",background:pk.hl?"#e67e22":"#1a3c5e",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>Paket wählen</button>
              </div>
            )}
          </div>
        </div>

        {/* CTA */}
        <div style={{padding:"60px 40px",background:"linear-gradient(135deg,#1a3c5e,#2e86c1)",textAlign:"center",color:"#fff"}}>
          <h2 style={{fontSize:"clamp(24px,4vw,36px)",fontWeight:800,margin:"0 0 12px"}}>Bereit, loszulegen?</h2>
          <p style={{fontSize:16,opacity:.7,margin:"0 0 28px",maxWidth:500,marginLeft:"auto",marginRight:"auto"}}>Konfigurieren Sie Ihre erste Website in wenigen Minuten.</p>
          <button onClick={()=>setView("configurator")} className="btn-hover" style={{padding:"16px 40px",background:"#e67e22",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:16,cursor:"pointer",fontFamily:"inherit"}}>Konfigurator öffnen →</button>
        </div>

        {/* FOOTER */}
        <div style={{padding:"48px 40px 24px",background:"#111",color:"#fff"}}>
          <div style={{maxWidth:1000,margin:"0 auto"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:32,marginBottom:32}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{width:28,height:28,borderRadius:6,background:"#2e86c1",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:10,height:10,borderRadius:2,border:"2px solid #fff"}}/></div>
                  <span style={{fontWeight:800,fontSize:16}}>MODULAR</span>
                </div>
                <p style={{fontSize:13,opacity:.5,lineHeight:1.6,maxWidth:280}}>Professionelle Webauftritte für jedes Unternehmen – schnell, modular und auf höchstem Niveau.</p>
                <div style={{marginTop:16,display:"flex",gap:8}}>{["LinkedIn","Twitter","GitHub"].map(s=><span key={s} style={{padding:"4px 10px",borderRadius:4,background:"rgba(255,255,255,.08)",fontSize:10,fontWeight:600,cursor:"default"}}>{s}</span>)}</div>
              </div>
              {[["Produkt",["Konfigurator","Module","Branchen","Preise","Changelog"]],["Unternehmen",["Über uns","Team","Karriere","Blog","Kontakt"]],["Rechtliches",["Impressum","Datenschutz","AGB","Cookie-Richtlinie","Nutzungsbedingungen"]]].map(([t,links],i)=>
                <div key={i}><div style={{fontSize:12,fontWeight:700,marginBottom:12}}>{t}</div>{links.map(l=><div key={l} style={{fontSize:12,opacity:.45,marginBottom:6,cursor:"default"}}>{l}</div>)}</div>
              )}
            </div>
            <div style={{borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:16,display:"flex",justifyContent:"space-between",fontSize:11,opacity:.35,flexWrap:"wrap",gap:8}}>
              <span>© 2026 MODULAR Website-Baukasten. Alle Rechte vorbehalten.</span>
              <span>Made with ♥ in Deutschland</span>
            </div>
          </div>
        </div>
      </div>
    );
  }


  /* ═══════════════════════════════════
     KONFIGURATOR
     ═══════════════════════════════════ */
  const TABS=[{id:"modules",ico:MI.layers,l:"Module"},{id:"design",ico:MI.palette,l:"Design"},{id:"media",ico:MI.image,l:"Medien"},{id:"fonts",ico:MI.typo,l:"Schrift"}];

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'DM Sans',sans-serif",color:"#1a1a1a",overflow:"hidden"}}>
      {/* SIDEBAR */}
      <div style={{width:340,borderRight:"1px solid rgba(0,0,0,.06)",display:"flex",flexDirection:"column",background:"#fff",flexShrink:0}}>
        <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(0,0,0,.06)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setView("landing")}>
            <div style={{width:26,height:26,borderRadius:6,background:"#1a3c5e",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:9,height:9,borderRadius:2,border:"2px solid #fff"}}/></div>
            <span style={{fontWeight:700,fontSize:13}}>MODULAR</span>
          </div>
          <div style={{fontSize:10,color:"#2e86c1",fontWeight:600}}>Konfigurator</div>
        </div>

        <div style={{display:"flex",borderBottom:"1px solid rgba(0,0,0,.06)"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 4px",background:"transparent",border:"none",borderBottom:activeTab===t.id?"2px solid #2e86c1":"2px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:activeTab===t.id?"#2e86c1":"rgba(0,0,0,.3)",transition:"all .2s",fontFamily:"inherit"}}>
            {t.ico}<span style={{fontSize:9,fontWeight:600}}>{t.l}</span>
          </button>)}
        </div>

        <div style={{flex:1,overflow:"auto",padding:14}}>

          {/* ── TAB: Module ── */}
          {activeTab==="modules"&&<>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}}>Branchen-Vorlage</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {window.PRESETS.map(p=><button key={p.id} onClick={()=>applyPreset(p)} style={{padding:"4px 10px",borderRadius:5,border:"1px solid rgba(0,0,0,.08)",background:"rgba(0,0,0,.02)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"inherit",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(46,134,193,.08)";e.currentTarget.style.borderColor="#2e86c1"}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(0,0,0,.02)";e.currentTarget.style.borderColor="rgba(0,0,0,.08)"}}>{p.name}</button>)}
              </div>
            </div>

            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}}>Aktive Module ({selMods.length})</div>
              {selMods.map((mid,idx)=>{
                const mod=window.MODULAR.get(mid);
                if(!mod) return null;
                return <div key={mid} draggable onDragStart={()=>setDI(idx)} onDragOver={e=>e.preventDefault()} onDrop={()=>{if(dragIdx!==null&&dragIdx!==idx)move(dragIdx,idx);setDI(null)}}
                  style={{display:"flex",alignItems:"center",gap:5,padding:"5px 7px",borderRadius:6,background:dragIdx===idx?"rgba(46,134,193,.12)":"rgba(46,134,193,.04)",marginBottom:3,border:"1px solid rgba(46,134,193,.1)",cursor:"grab",transition:"background .2s"}}>
                  <span style={{opacity:.25,cursor:"grab",display:"flex"}}>{MI.grip}</span>
                  <span style={{fontSize:13,width:20,textAlign:"center"}}>{mod.icon}</span>
                  <span style={{flex:1,fontWeight:600,fontSize:11}}>{mod.name}</span>
                  <select value={variants[mid]||0} onChange={e=>{e.stopPropagation();setVar(mid,parseInt(e.target.value))}} style={{fontSize:9,padding:"2px 4px",borderRadius:3,border:"1px solid rgba(0,0,0,.1)",background:"#fff",fontFamily:"inherit",cursor:"pointer",maxWidth:80}} onClick={e=>e.stopPropagation()}>
                    {mod.vars.map((vn,vi)=><option key={vi} value={vi}>{vn}</option>)}
                  </select>
                  <button onClick={e=>{e.stopPropagation();toggle(mid)}} style={{background:"none",border:"none",cursor:"pointer",opacity:.25,color:"inherit",padding:1,display:"flex"}}>{MI.trash}</button>
                </div>;
              })}
            </div>

            {cats.map(cat=>{
              const mods=allModules.filter(m=>m.cat===cat);
              return <div key={cat} style={{marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,opacity:.35,textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>{cat}</div>
                {mods.map(mod=><div key={mod.id} onClick={()=>toggle(mod.id)} style={{padding:"8px 10px",borderRadius:7,border:selMods.includes(mod.id)?"2px solid #2e86c1":"2px solid transparent",background:selMods.includes(mod.id)?"rgba(46,134,193,.06)":"rgba(0,0,0,.02)",cursor:"pointer",transition:"all .2s",marginBottom:4,display:"flex",alignItems:"center",gap:8}}
                  onMouseEnter={e=>e.currentTarget.style.background=selMods.includes(mod.id)?"rgba(46,134,193,.1)":"rgba(0,0,0,.04)"}
                  onMouseLeave={e=>e.currentTarget.style.background=selMods.includes(mod.id)?"rgba(46,134,193,.06)":"rgba(0,0,0,.02)"}>
                  <div style={{width:28,height:28,borderRadius:5,background:selMods.includes(mod.id)?"#2e86c1":"rgba(0,0,0,.06)",color:selMods.includes(mod.id)?"#fff":"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0,transition:"all .2s"}}>{mod.icon}</div>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600}}>{mod.name}</div><div style={{fontSize:10,opacity:.45,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{mod.desc}</div></div>
                  {selMods.includes(mod.id)&&<span style={{color:"#2e86c1",flexShrink:0}}>{MI.check}</span>}
                </div>)}
              </div>;
            })}
          </>}

          {/* ── TAB: Design ── */}
          {activeTab==="design"&&<>
            <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>Farbschema</div>
            <CI label="Primärfarbe" value={colors.primary} onChange={v=>setColors(p=>({...p,primary:v}))}/>
            <CI label="Sekundärfarbe" value={colors.secondary} onChange={v=>setColors(p=>({...p,secondary:v}))}/>
            <CI label="Akzentfarbe" value={colors.accent} onChange={v=>setColors(p=>({...p,accent:v}))}/>
            <div style={{display:"flex",gap:6,margin:"12px 0"}}>{Object.entries(colors).map(([k,v])=><div key={k} style={{flex:1,textAlign:"center"}}><div style={{height:32,borderRadius:6,background:v}}/><div style={{fontSize:9,opacity:.4,marginTop:2}}>{k}</div></div>)}</div>
            <div style={{height:1,background:"rgba(0,0,0,.06)",margin:"14px 0"}}/>
            <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:8}}>Unternehmensdaten</div>
            {[["Firmenname",companyName,setCN],["Straße & Hausnr.",address,setAddr],["PLZ",zip,setZip],["Stadt",city,setCity],["Telefon",phone,setPhone],["E-Mail",email,setEmail]].map(([l,v,fn],i)=>
              <div key={i} style={{marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:600,opacity:.5,marginBottom:2}}>{l}</div>
                <input type="text" value={v} onChange={e=>fn(e.target.value)} placeholder={l} style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid rgba(0,0,0,.1)",fontSize:12,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
              </div>
            )}
          </>}

          {/* ── TAB: Medien ── */}
          {activeTab==="media"&&<>
            <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>Logo & Bilder</div>
            <FU label="Firmenlogo" accept="image/*" onUp={(d)=>setLogo(d)} preview={logo} onRm={()=>setLogo(null)}/>
            <FU label="Hero-Bild" accept="image/*" onUp={d=>setHeroImage(d)} preview={heroImage} onRm={()=>setHeroImage(null)}/>
            <div style={{height:1,background:"rgba(0,0,0,.06)",margin:"14px 0"}}/>
            <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Galerie ({galleryImages.length}/6)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:8}}>
              {galleryImages.map((img,i)=><div key={i} style={{position:"relative",borderRadius:5,overflow:"hidden",aspectRatio:"1"}}>
                <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                <button onClick={()=>setGalleryImages(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:3,width:16,height:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>{MI.x}</button>
              </div>)}
            </div>
            {galleryImages.length<6&&<FU label="Galerie-Bild" accept="image/*" onUp={d=>setGalleryImages(p=>[...p,d])} preview={null} onRm={()=>{}}/>}
            <div style={{height:1,background:"rgba(0,0,0,.06)",margin:"14px 0"}}/>
            <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Partner-Logos ({partnerLogos.length}/8)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:8}}>
              {partnerLogos.map((img,i)=><div key={i} style={{position:"relative",borderRadius:5,overflow:"hidden",aspectRatio:"2/1",background:"#f8f8f8",border:"1px solid rgba(0,0,0,.06)"}}>
                <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"contain",padding:2}}/>
                <button onClick={()=>setPartnerLogos(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:1,right:1,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:3,width:14,height:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>{MI.x}</button>
              </div>)}
            </div>
            {partnerLogos.length<8&&<FU label="Partner-Logo" accept="image/*" onUp={d=>setPartnerLogos(p=>[...p,d])} preview={null} onRm={()=>{}}/>}
          </>}

          {/* ── TAB: Schrift ── */}
          {activeTab==="fonts"&&<>
            <div style={{fontSize:10,fontWeight:700,opacity:.4,textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>Schriftart</div>
            {window.FONTS.map(f=><div key={f.name} onClick={()=>setFont(f.val)} style={{padding:"10px 12px",borderRadius:7,border:font===f.val?"2px solid #2e86c1":"2px solid transparent",background:font===f.val?"rgba(46,134,193,.06)":"rgba(0,0,0,.02)",cursor:"pointer",marginBottom:5,transition:"all .2s"}}>
              <div style={{fontSize:15,fontFamily:f.val,fontWeight:700,marginBottom:1}}>{f.name}</div>
              <div style={{fontSize:11,fontFamily:f.val,opacity:.5}}>Professionelle Websites modular gebaut</div>
            </div>)}
          </>}
        </div>
      </div>

      {/* VORSCHAU */}
      <div style={{flex:1,display:"flex",flexDirection:"column",background:"#f0f0ed",overflow:"hidden"}}>
        <div style={{padding:"7px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(0,0,0,.06)",background:"#fff",gap:8}}>
          <div style={{display:"flex",gap:5}}>
            {[["desktop","Desktop"],["tablet","Tablet"],["mobile","Mobile"]].map(([id,l])=>
              <button key={id} onClick={()=>setPM(id)} style={{padding:"4px 12px",borderRadius:5,border:"none",background:previewMode===id?"#1a3c5e":"rgba(0,0,0,.04)",color:previewMode===id?"#fff":"rgba(0,0,0,.45)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>{l}</button>
            )}
          </div>
          <button onClick={()=>setEditMode(!editMode)} style={{padding:"4px 12px",borderRadius:5,border:editMode?"2px solid #e67e22":"2px solid rgba(0,0,0,.08)",background:editMode?"rgba(230,126,34,.08)":"transparent",color:editMode?"#e67e22":"rgba(0,0,0,.5)",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4,transition:"all .2s"}}>
            {MI.edit} {editMode?"Bearbeitung aktiv":"Texte bearbeiten"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,opacity:.4}}>{MI.eye} Vorschau</div>
        </div>

        <div style={{flex:1,overflow:"auto",display:"flex",justifyContent:"center",padding:16}}>
          <div style={{width:previewMode==="desktop"?"100%":previewMode==="tablet"?768:375,maxWidth:"100%",background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.08)",transition:"width .4s ease",alignSelf:"flex-start"}}>
            {selMods.length===0
              ? <div style={{padding:60,textAlign:"center",opacity:.3}}>
                  <div style={{fontSize:40,marginBottom:12}}>◇</div>
                  <div style={{fontSize:14,fontWeight:600}}>Keine Module ausgewählt</div>
                  <div style={{fontSize:12,marginTop:4}}>Fügen Sie Module im linken Panel hinzu</div>
                </div>
              : selMods.map(mid => {
                  const mod = window.MODULAR.get(mid);
                  if (!mod || !mod.render) return <div key={mid} style={{padding:20,textAlign:"center",opacity:.3,fontSize:12}}>Modul "{mid}" nicht gefunden</div>;
                  return <div key={mid}>{mod.render(cfg, editMode)}</div>;
                })
            }
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
